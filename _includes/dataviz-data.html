<script>
  // Reachability data (total per key, summed across all fingers per participant)
  {% assign fingers = "LT,LI,LM,LR,LL,RT,RI,RM,RR,RL" | split: "," %}
  {% assign faceNames = "R,B,G,W,Y" | split: "," %}
  let reachabilityData = [
    {% for row in site.data.reachability %}
    {
      number: {{ row.Number }},
      {% for face in faceNames %}
      {{ face }}: [{% for k in (1..16) %}{% assign total = 0 %}{% for f in fingers %}{% capture col %}{{ f }}-{{ face }}{{ k }}{% endcapture %}{% assign val = row[col] | plus: 0 %}{% if val == 2 %}{% assign val = 3 %}{% endif %}{% assign total = total | plus: val %}{% endfor %}{{ total }}{% unless forloop.last %},{% endunless %}{% endfor %}]{% unless forloop.last %},{% endunless %}
      {% endfor %}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  // Per-finger reachability data
  let perFingerReachability = {};
  {% for f in fingers %}
  perFingerReachability['{{ f }}'] = [
    {% for row in site.data.reachability %}
    {
      {% for face in faceNames %}
      {{ face }}: [{% for k in (1..16) %}{% capture col %}{{ f }}-{{ face }}{{ k }}{% endcapture %}{% assign val = row[col] | plus: 0 %}{% if val == 2 %}3{% else %}{{ val }}{% endif %}{% unless forloop.last %},{% endunless %}{% endfor %}]{% unless forloop.last %},{% endunless %}
      {% endfor %}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];
  {% endfor %}

  let preferenceAggregate;

  (function () {
    let faces = ['R', 'B', 'G', 'W', 'Y'];
    let fingerMap = ['LL', 'LR', 'LM', 'LI', 'LT', 'RT', 'RI', 'RM', 'RR', 'RL'];
    let aggregate = { scores: {}, dominantFingers: {}, tiedFingers: {} };

    faces.forEach(function (face) {
      aggregate.scores[face] = [];
      aggregate.dominantFingers[face] = [];
      aggregate.tiedFingers[face] = [];

      for (let i = 0; i < 16; i++) {
        let counts = new Array(10).fill(0);

        participantsData.forEach(function (participant) {
          let fingerCode = participant[face][i];
          if (fingerCode >= 1 && fingerCode <= 10) counts[fingerCode - 1] += 1;
        });

        let maxCount = Math.max.apply(null, counts);
        let tiedFingerCodes = counts
          .map(function (count, index) { return count === maxCount ? fingerMap[index] : null; })
          .filter(Boolean);

        aggregate.scores[face].push(+(maxCount / participantsData.length).toFixed(2));
        aggregate.dominantFingers[face].push(tiedFingerCodes[0]);
        aggregate.tiedFingers[face].push(tiedFingerCodes);
      }
    });

    preferenceAggregate = aggregate;
  })();
</script>
