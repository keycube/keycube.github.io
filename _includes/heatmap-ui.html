{% assign e = site.data[page.lang]['heatmap-ui'] %}

<!-- ── Top bar: hand selector + quick actions ── -->
<div class="top-bar">
    <div class="glass-panel" style="padding: 8px 14px;">
        <div class="hand-selector-container">
            <!-- Left Hand -->
            <div class="hand-analog" id="left-hand-analog">
                <div class="analog-ring" data-hand="left">
                    <div class="analog-stick"><span class="analog-center-label">{{ e.left }}</span></div>
                    <button class="finger-dot finger-thumb-left" data-finger="LT" data-tooltip="{{ e.hf_format | replace: 'h', e.left | replace: 'f', e.thumb }}"><span class="finger-letter">{{ e.t }}</span></button>
                    <button class="finger-dot finger-index-left" data-finger="LI" data-tooltip="{{ e.hf_format | replace: 'h', e.left | replace: 'f', e.index }}"><span class="finger-letter">{{ e.i }}</span></button>
                    <button class="finger-dot finger-middle-left" data-finger="LM" data-tooltip="{{ e.hf_format | replace: 'h', e.left | replace: 'f', e.middle }}"><span class="finger-letter">{{ e.m }}</span></button>
                    <button class="finger-dot finger-ring-left" data-finger="LR" data-tooltip="{{ e.hf_format | replace: 'h', e.left | replace: 'f', e.ring }}"><span class="finger-letter">{{ e.r }}</span></button>
                    <button class="finger-dot finger-little-left" data-finger="LL" data-tooltip="{{ e.hf_format | replace: 'h', e.left | replace: 'f', e.little }}"><span class="finger-letter">{{ e.l }}</span></button>
                </div>
            </div>
            <!-- Center: All + Best buttons -->
            <div class="hand-divider" style="display: flex; flex-direction: column; gap: 6px; margin: 20px;">
                <button class="hand-action-btn active" id="btn-all-fingers" data-tooltip="{{ e.all_combined }}">{{ e.all_button }}</button>
                <button class="hand-action-btn" id="btn-best-finger" data-tooltip="{{ e.preferred }}">{{ e.preferred_button }}</button>
            </div>
            <!-- Right Hand -->
            <div class="hand-analog" id="right-hand-analog">
                <div class="analog-ring" data-hand="right">
                    <div class="analog-stick"><span class="analog-center-label">{{ e.right }}</span></div>
                    <button class="finger-dot finger-thumb-right" data-finger="RT" data-tooltip="{{ e.hf_format | replace: 'h', e.right | replace: 'f', e.thumb }}"><span class="finger-letter">{{ e.t }}</span></button>
                    <button class="finger-dot finger-index-right" data-finger="RI" data-tooltip="{{ e.hf_format | replace: 'h', e.right | replace: 'f', e.index }}"><span class="finger-letter">{{ e.i }}</span></button>
                    <button class="finger-dot finger-middle-right" data-finger="RM" data-tooltip="{{ e.hf_format | replace: 'h', e.right | replace: 'f', e.middle }}"><span class="finger-letter">{{ e.m }}</span></button>
                    <button class="finger-dot finger-ring-right" data-finger="RR" data-tooltip="{{ e.hf_format | replace: 'h', e.right | replace: 'f', e.ring }}"><span class="finger-letter">{{ e.r }}</span></button>
                    <button class="finger-dot finger-little-right" data-finger="RL" data-tooltip="{{ e.hf_format | replace: 'h', e.right | replace: 'f', e.little }}"><span class="finger-letter">{{ e.l }}</span></button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Hidden select for dataviz.js compatibility -->
<select class="finger-select" id="finger-select" style="display:none;">
    <option value="total">{{ e.total }}</option>
    <option value="LT">{{ e.hf_format | replace: 'h', e.left | replace: 'f', e.thumb }}</option>
    <option value="LI">{{ e.hf_format | replace: 'h', e.left | replace: 'f', e.index }}</option>
    <option value="LM">{{ e.hf_format | replace: 'h', e.left | replace: 'f', e.middle }}</option>
    <option value="LR">{{ e.hf_format | replace: 'h', e.left | replace: 'f', e.ring }}</option>
    <option value="LL">{{ e.hf_format | replace: 'h', e.left | replace: 'f', e.little }}</option>
    <option value="RT">{{ e.hf_format | replace: 'h', e.right | replace: 'f', e.thumb }}</option>
    <option value="RI">{{ e.hf_format | replace: 'h', e.right | replace: 'f', e.index }}</option>
    <option value="RM">{{ e.hf_format | replace: 'h', e.right | replace: 'f', e.middle }}</option>
    <option value="RR">{{ e.hf_format | replace: 'h', e.right | replace: 'f', e.ring }}</option>
    <option value="RL">{{ e.hf_format | replace: 'h', e.right | replace: 'f', e.little }}</option>
</select>

<!-- 3D Render of the Keycube -->
{% include dataviz-data.html %}

<!-- ── Bottom bar: badge + finger context + legend + reset ── -->
<div class="bottom-bar">
    <div class="finger-context" id="finger-context">
        {{ e.finger_context }}
    </div>

    <div class="heatmap-legend">
        <span>{{ e.unreachable }}</span>
        <div class="heatmap-gradient"></div>
        <span>{{ e.reachable }}</span>
    </div>

    <div style="flex-basis: 100%; display: flex; justify-content: center; align-items: center;">
        <button class="reset-view-btn" id="reset-view-btn">{{ e.reset_view }}</button>
    </div>
</div>

<script src="/assets/js/dataviz.js"></script>
<script type="module">
    import langFinger from '/assets/js/ui-lang.json' with {type:"json"};

    document.addEventListener('DOMContentLoaded', function () {
        const fingerSelect = document.getElementById('finger-select');
        const selectionText = document.getElementById('selection-text');
        const selectionIcon = document.querySelector('#selection-badge .selection-icon');
        const fingerContext = document.getElementById('finger-context');
        const allFingerDots = document.querySelectorAll('.finger-dot');
        const analogRings = document.querySelectorAll('.analog-ring');
        const btnAllFingers = document.getElementById('btn-all-fingers');
        const btnBestFinger = document.getElementById('btn-best-finger');
        const handActionBtns = document.querySelectorAll('.hand-action-btn');
        const FACES = ['R', 'B', 'G', 'W', 'Y'];
        const ALL_FINGERS = ['LT', 'LI', 'LM', 'LR', 'LL', 'RT', 'RI', 'RM', 'RR', 'RL'];

        const lang = document.documentElement.lang
        const fingerData = langFinger[lang] ? langFinger[lang] : langFinger["en"];


        function updateUI(key, activeFingers) {
            const data = fingerData[key] || {name: key, icon: '', info: ''};
            if (selectionText) selectionText.textContent = data.name;
            if (selectionIcon) selectionIcon.textContent = data.icon;
            if (fingerContext) fingerContext.textContent = data.info;

            allFingerDots.forEach(function (dot) {
                const f = dot.getAttribute('data-finger');
                dot.classList.toggle('active', activeFingers ? activeFingers.indexOf(f) !== -1 : f === key);
            });
            analogRings.forEach(function (ring) { ring.classList.remove('active'); });
            if (activeFingers && activeFingers.length === ALL_FINGERS.length) {
                const leftRing = document.querySelector('.analog-ring[data-hand="left"]');
                const rightRing = document.querySelector('.analog-ring[data-hand="right"]');
                if (leftRing) leftRing.classList.add('active');
                if (rightRing) rightRing.classList.add('active');
            } else if (key.charAt(0) === 'L' || key === 'left-all') {
                const lr = document.querySelector('.analog-ring[data-hand="left"]');
                if (lr) lr.classList.add('active');
            } else if (key.charAt(0) === 'R' || key === 'right-all') {
                const rr = document.querySelector('.analog-ring[data-hand="right"]');
                if (rr) rr.classList.add('active');
            }
        }

        function applyHeatmap(data, fixedRange) {
            let min = fixedRange ? fixedRange.min : Infinity;
            let max = fixedRange ? fixedRange.max : -Infinity;
            if (!fixedRange) {
                FACES.forEach(function (f) { data[f].forEach(function (v) { if (v < min) min = v; if (v > max) max = v; }); });
            }
            if (window.updateModel) {
                window.updateModel({ heatmap: data, heatmapMin: min, heatmapMax: max, scores: data, showScores: true, isReachability: true, scoreFormat: 'integer', figure6View: false });
            }
        }

        function computeHandData(fingers) {
            const result = {};
            FACES.forEach(function (face) {
                result[face] = [];
                for (let i = 0; i < 16; i++) {
                    let sum = 0;
                    fingers.forEach(function (f) {
                        const fData = window.perFingerReachability[f];
                        if (fData) fData.forEach(function (p) { sum += p[face][i]; });
                    });
                    result[face].push(sum);
                }
            });
            return result;
        }

        function updateSelection(fingerValue) {
            if (fingerSelect) { fingerSelect.value = fingerValue; fingerSelect.dispatchEvent(new Event('change')); }
            updateUI(fingerValue, fingerValue === 'total' ? ALL_FINGERS : null);
            handActionBtns.forEach(function (btn) { btn.classList.remove('active'); });
            if (fingerValue === 'total') btnAllFingers.classList.add('active');
        }

        function handleHandAll(hand) {
            const fingers = hand === 'left' ? ['LT', 'LI', 'LM', 'LR', 'LL'] : ['RT', 'RI', 'RM', 'RR', 'RL'];
            applyHeatmap(computeHandData(fingers));
            updateUI(hand + '-all', fingers);
            handActionBtns.forEach(function (btn) { btn.classList.remove('active'); });
        }

        function handleBestFinger() {
            const preferenceAggregate = window.preferenceAggregate;
            if (!preferenceAggregate) return;
            const result = {};
            FACES.forEach(function (face) {
                result[face] = [];
                for (let i = 0; i < 16; i++) {
                    let best = 0;
                    const preferredFingers = preferenceAggregate.tiedFingers[face][i];
                    preferredFingers.forEach(function (f) {
                        const fData = window.perFingerReachability[f];
                        if (fData) {
                            let s = 0;
                            fData.forEach(function (p) { s += p[face][i]; }); if (s > best) best = s; }
                    });
                    result[face].push(best);
                }
            });
            applyHeatmap(result, { min: 0, max: 66 });
            updateUI('best', ALL_FINGERS);
            handActionBtns.forEach(function (btn) { btn.classList.remove('active'); });
            btnBestFinger.classList.add('active');
        }

        allFingerDots.forEach(function (dot) {
            dot.addEventListener('click', function (e) { e.stopPropagation(); updateSelection(dot.getAttribute('data-finger')); });
        });
        analogRings.forEach(function (ring) {
            ring.addEventListener('click', function (e) { if (!e.target.closest('.finger-dot')) handleHandAll(ring.getAttribute('data-hand')); });
        });
        if (btnAllFingers) btnAllFingers.addEventListener('click', function () { updateSelection('total'); });
        if (btnBestFinger) btnBestFinger.addEventListener('click', handleBestFinger);
    });
</script>
