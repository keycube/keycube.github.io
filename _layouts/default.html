<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body{% if page.body_class %} class="{{ page.body_class }}"{% endif %}>

    {%- include header.html -%}

    <main class="{{ page.main_class | default: 'page-content' }}" aria-label="Content">
      {% if page.use_wrapper == false %}
        {{ content }}
      {% else %}
      <div class="wrapper">
        {{ content }}
      </div>
      {% endif %}
    </main>

    {%- include footer.html -%}

    <!-- fix for the scrollbar -->
    <script type="application/javascript" src="/assets/js/scrollbar.js"></script>

  </body>

</html>
