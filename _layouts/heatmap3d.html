<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}" class="heatmap3d-app">
  {%- include head.html -%}
<body class="heatmap3d-app" data-default-mode="{{ page.default_mode | default: 'preference' }}">
  {%- include header.html -%}
  <main class="page-content heatmap3d-page-content" aria-label="Heatmap 3D">
    {{ content }}
  </main>
  <!-- Three.js import map -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  {% include heatmap3d-model-viewer.html %}
  {% include heatmap3d-data.html %}
  <script src="{{ '/assets/js/heatmap3d/dataviz.js' | relative_url }}"></script>
</body>
</html>
